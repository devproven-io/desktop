name: NuGet CLI Publish

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  # Build Rust native parser on each platform in parallel
  build-native-windows:
    runs-on: windows-latest
    steps:
      - name: Clone analyzer
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DOTNET_REPO }}
          token: ${{ secrets.DOTNET_REPO_PAT }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build Rust parser
        working-directory: src/skillmatch-parser
        shell: cmd
        env:
          CC: cl
          CXX: cl
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload native lib
        uses: actions/upload-artifact@v4
        with:
          name: native-win-x64
          path: src/skillmatch-parser/target/x86_64-pc-windows-msvc/release/skillmatch_parser.dll

  build-native-macos:
    runs-on: macos-latest
    steps:
      - name: Clone analyzer
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DOTNET_REPO }}
          token: ${{ secrets.DOTNET_REPO_PAT }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build Rust parser (ARM64)
        working-directory: src/skillmatch-parser
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build Rust parser (x64)
        working-directory: src/skillmatch-parser
        run: cargo build --release --target x86_64-apple-darwin

      - name: Upload native lib (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: native-osx-arm64
          path: src/skillmatch-parser/target/aarch64-apple-darwin/release/libskillmatch_parser.dylib

      - name: Upload native lib (x64)
        uses: actions/upload-artifact@v4
        with:
          name: native-osx-x64
          path: src/skillmatch-parser/target/x86_64-apple-darwin/release/libskillmatch_parser.dylib

  build-native-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Clone analyzer
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DOTNET_REPO }}
          token: ${{ secrets.DOTNET_REPO_PAT }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build Rust parser
        working-directory: src/skillmatch-parser
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload native lib
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: src/skillmatch-parser/target/x86_64-unknown-linux-gnu/release/libskillmatch_parser.so

  # Pack and publish NuGet with all native libs
  nuget-pack:
    needs: [build-native-windows, build-native-macos, build-native-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Clone analyzer
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DOTNET_REPO }}
          token: ${{ secrets.DOTNET_REPO_PAT }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Download all native libs and place in expected native/ directory structure
      - uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: native/win-x64

      - uses: actions/download-artifact@v4
        with:
          name: native-osx-arm64
          path: native/osx-arm64

      - uses: actions/download-artifact@v4
        with:
          name: native-osx-x64
          path: native/osx-x64

      - uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: native/linux-x64

      - name: Verify native libs
        run: |
          echo "=== Native libs ==="
          find native -type f | sort

      - name: Pack NuGet
        run: dotnet pack src/SkillMatch.Cli/SkillMatch.Cli.csproj -c Release -o nupkg

      - name: Verify package contents
        run: |
          echo "=== Package contents (native libs) ==="
          unzip -l nupkg/*.nupkg | grep -E "runtimes|native|skillmatch_parser"

      - name: Publish to NuGet.org
        if: startsWith(github.ref, 'refs/tags/cli-v')
        run: |
          dotnet nuget push nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Upload nupkg artifact (for manual publish)
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: nupkg/*.nupkg
